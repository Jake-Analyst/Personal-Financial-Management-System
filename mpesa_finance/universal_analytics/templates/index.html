<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload · Personal Finance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center">
  <div class="bg-[#1e293b] p-8 rounded-2xl shadow-2xl w-full max-w-md border border-[#334155]">
    <h1 class="text-3xl font-bold text-white text-center mb-2">💰 Personal Finance</h1>
    <p class="text-gray-400 text-sm text-center mb-6">Upload your M‑Pesa statement</p>
    <form action="/upload" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" accept=".csv,.xlsx,.xls,.xlsm"
             class="mb-4 w-full text-gray-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:bg-indigo-600 file:text-white hover:file:bg-indigo-700">
      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
        Process File
      </button>
    </form>
    <p class="text-xs text-gray-500 mt-4 text-center">Built by <span class="text-indigo-400">JAKE</span></p>
  </div>
</body>
</html>
